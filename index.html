<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Partagé</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .features {
            margin: 30px 0;
            text-align: left;
        }

        .feature {
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📁 Upload Partagé</h1>
            <p style="color: #666; margin-bottom: 30px;">Partagez vos fichiers en toute simplicité</p>
            
            <div class="features">
                <div class="feature">
                    🔐 <strong>Comptes sécurisés</strong> - Chaque utilisateur a son espace privé
                </div>
                <div class="feature">
                    🌍 <strong>Espace public</strong> - Partagez avec tous les utilisateurs
                </div>
                <div class="feature">
                    🔒 <strong>Espace privé</strong> - Vos fichiers personnels
                </div>
                <div class="feature">
                    📱 <strong>Mobile friendly</strong> - Fonctionne sur tous les appareils
                </div>
            </div>
            
            <div class="buttons">
                <a href="/login" class="btn btn-primary">🔐 Se connecter</a>
            </div>
        </div>
    </div>
</body>
</html>
